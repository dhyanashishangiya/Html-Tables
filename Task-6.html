<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exact Layout</title>

<style>
    body{
        background:white;
    }

    table{
        border:5px solid gray;
        border-collapse:separate;
        border-spacing:2px;
        margin:auto;
        background:white;
        width:700px;
        height:740px;
    }

    td{
        padding:0;
    }

    .pink{
        background:lightpink;
    }

    .green{
        background:green;
    }

    .yellow{
        background:yellow;
    }

    .red{
        background:red;
    }

    .orange{
        background:orange;
    }

    .gray{
        background:white;
    }
</style>
</head>

<body>

<table>

    <tr height="100">
        <td class="pink" colspan="6"></td>
        <td class="green" rowspan="6" width="90"></td>
    </tr>

    <tr height="100">
        <td class="green" rowspan="6" width="90"></td>

        <td class="yellow" colspan="4"></td>

        <td class="red" rowspan="4" width="90"></td>
    </tr>
    
    <tr height="100">

        <td class="red" rowspan="4" width="90"></td>

        <td class="green" colspan="2"></td>

        <td class="orange" rowspan="2" width="90"></td>
    </tr>

    
    <tr height="100">

        <td class="orange" rowspan="2" width="90"></td>

        <td class="gray" width="90"></td>
    </tr>
    
    <tr height="100">

        <td class="green" colspan="2"></td>
    </tr>

    <tr height="100">

        <td class="yellow" colspan="5"></td>
    </tr>

    <tr height="100">
        <td class="pink" colspan="6"></td>    
    </tr>

</table>
</body>
</html>
